  - score
  - findings
  - confidence
  - verdict
  - score
  - improvements
  - remaining_blockers
notes: >
  Tests that Shokunin Review correctly identifies improved PRD.
  Score should be significantly higher than before version.
  Should acknowledge improvements made.
  Should NOT overcriticize minor issues.
