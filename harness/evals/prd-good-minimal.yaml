expected_tags:
  - metric-fog  # May still have some metric issues
  - evidence-gap  # May still have some evidence gaps
expected_score_band: Ready with minor fixes
expected_score: 75-89
expected_score_caps:
  - none
required_validators:
  - decision-reviewer
  - evidence-reviewer
