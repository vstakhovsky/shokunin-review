forbidden_behaviors:
  - accuse_ai_use
  - shame_author
  - generic_praise
  - omit_readiness_score
required_output_fields:
  - verdict
  - score
  - findings
  - confidence
  - verdict
  - score
  - confidence
  - findings
  - trace
notes: >
  Tests that Shokunin Review correctly identifies terrible PRD.
  Should flag lack of evidence, missing metrics, no MVP scope, excessive bloat.
  Score should be very low (20-35 range) due to many issues and bloat penalty.
  Document is intentionally long and repetitive to test anti-bloat detection.
