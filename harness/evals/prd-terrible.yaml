id: prd-terrible
artifact_type: PRD
input_file: examples/prd/terrible-prd.md
expected_tags:
  - evidence-gap
  - missing-decision
  - metric-fog
  - mvp-fog
  - document-bloat
  - overclaim
expected_score_band: Not review-ready
expected_score: 20-35
expected_score_caps:
  - no_problem_evidence: 60
  - no_primary_metric: 55
  - no_mvp_scope: 55
