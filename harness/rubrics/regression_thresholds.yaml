# Shokunin Regression Thresholds
# Define acceptable quality thresholds for eval metrics

# Default thresholds - used for normal eval runs
default:
  critical_recall_min: 0.90          # 90% of critical findings must be detected
  finding_recall_min: 0.75          # 75% of expected findings should be detected
  hallucination_rate_max: 0.10      # Max 10% false positives
  average_score_calibration_error_max: 8  # Average score error within 8 points
  tone_pass_rate_min: 1.00          # 100% of evals must pass tone check
  recommendation_specificity_min: 0.75  # 75% of recommendations must be specific

# Strict thresholds - used for --strict mode
# Use these when validating changes to prompts, rubrics, or validators
strict:
  critical_recall_min: 1.00         # 100% of critical findings must be detected
  finding_recall_min: 0.85          # 85% of expected findings should be detected
  hallucination_rate_max: 0.05      # Max 5% false positives
  average_score_calibration_error_max: 5  # Average score error within 5 points
  tone_pass_rate_min: 1.00          # 100% of evals must pass tone check
  recommendation_specificity_min: 0.85  # 85% of recommendations must be specific

# Relaxed thresholds - used for development/experimentation
relaxed:
  critical_recall_min: 0.80         # 80% of critical findings must be detected
  finding_recall_min: 0.65          # 65% of expected findings should be detected
  hallucination_rate_max: 0.15      # Max 15% false positives
  average_score_calibration_error_max: 12  # Average score error within 12 points
  tone_pass_rate_min: 1.00          # 100% of evals must pass tone check (never relax this)
  recommendation_specificity_min: 0.65  # 65% of recommendations must be specific

# Threshold descriptions
threshold_descriptions:
  critical_recall_min: |
    Percentage of critical findings (from expected_findings.critical_misses)
    that are actually detected in the review output. Critical findings are
    must-have gaps that should never be missed.

  finding_recall_min: |
    Percentage of expected findings (from expected_findings.must_detect)
    that are actually detected. Includes all severity levels.

  hallucination_rate_max: |
    Percentage of findings that should NOT have been detected
    (from expected_findings.should_not_detect) but were flagged anyway.
    Also includes invented findings with no evidence in the input.

  average_score_calibration_error_max: |
    Average absolute difference between actual scores and expected score ranges.
    Error = 0 if score is within expected range. Otherwise, distance from nearest bound.

  tone_pass_rate_min: |
    Percentage of evals that pass the tone quality check.
    Should always be 1.00 - toxic or dismissive tone is never acceptable.

  recommendation_specificity_min: |
    Percentage of evals where recommendations include concrete action verbs
    and reference specific objects (decision log, metrics, owner, etc.).
